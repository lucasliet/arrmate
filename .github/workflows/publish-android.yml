name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  generate-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    outputs:
      release_notes: ${{ steps.set_output.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate Release Notes with Claude
        continue-on-error: true
        env:
          # Route Claude Code through the z.ai Anthropic-compatible endpoint.
          # ANTHROPIC_AUTH_TOKEN is sent as a Bearer token; ANTHROPIC_API_KEY
          # would be sent as x-api-key, which z.ai rejects with 401.
          ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ZAI_API_KEY }}
          AI_MODEL: glm-5.2
        run: |
          # Get previous tag or root
          PREV_TAG=$(git describe --tags --abbrev=0 --match "v*" HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then RANGE="HEAD"; else RANGE="$PREV_TAG..HEAD"; fi

          # Build the prompt into a file to avoid shell quoting issues with
          # special characters in commit messages (quotes, backticks, $).
          # Quoted heredocs ('EOF') disable shell expansion entirely; the git
          # log is appended verbatim so its content is never interpreted.
          cat > prompt.txt <<'EOF'
          REPO: ${{ github.repository }}
          VERSION: ${{ github.ref_name }}

          CHANGES:
          EOF
          git log "$RANGE" --pretty=format:"%h - %s (%an)" >> prompt.txt
          cat >> prompt.txt <<'EOF'

          TASK: Generate meaningful release notes for this version based on the changes above.

          GUIDELINES:
          - Focus on meaningful changes for final user experience, so ignore technical details like refactor and tests made, etc.
          - Answer everything in brazilian portuguese
          - Start with the title '# ${{ github.repository }} ${{ github.ref_name }}'
          - Write a brief, engaging summary paragraph explaining what this release achieves.
          - Group changes into '## Key Features' (if there are any) and '## Bug Fixes' (if there are any).
          - Use bullet points.
          - Be concise but descriptive.
          - Ignore trivial commits (docs, chores) unless significant.
          - DO NOT USE EMOJIS anywhere in the output. Use standard Markdown only.

          Output ONLY the markdown content.
          EOF

          # Feed the prompt via stdin; --output-format text prints only the
          # final message to stdout, which we redirect to RELEASE_BODY.md.
          claude -p --model "$AI_MODEL" --output-format text --max-turns 2 < prompt.txt > RELEASE_BODY.md

      - name: Fallback on empty output
        run: |
          # Fallback: Use last commit message if generation failed or file missing/empty
          if [ ! -s RELEASE_BODY.md ]; then
            git log -1 --pretty=%B > RELEASE_BODY.md
          fi
      
      - name: Set Output
        id: set_output
        run: |
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          cat RELEASE_BODY.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build_app:
    name: Build Android Application
    needs: generate-notes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download Android keystore
        id: android_keystore
        uses: timheuer/base64-to-file@v1
        with:
          fileName: upload-keystore.jks
          encodedString: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Create key.properties
        run: |
          echo "storeFile=${{ steps.android_keystore.outputs.filePath }}" > android/key.properties
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: "21"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: 'stable'
          cache: 'true'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Icons
        run: dart run flutter_launcher_icons

      # - name: Build Android App Bundle
      #   run: >
      #     flutter build appbundle 
      #     --build-number=${{ github.run_number }} 
      #     --build-name=0.0.${{ github.run_number }}
      
      # - name: Publish Release to PlayStore internal track
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.PLAYSTORE_ACCOUNT_KEY }}
      #     packageName: br.com.lucasliet.blueguava
      #     releaseFiles: build/app/outputs/bundle/release/app-release.aab
      #     track: internal
      #     status: draft

      - name: Build APKs
        run: >
          flutter build apk --release --split-per-abi
          --build-number=${{ github.run_number }}
          --build-name=${{ github.ref_name }}

      - name: Publish Release to Github
        uses: ncipollo/release-action@v1
        if: github.ref_type == 'tag'
        with:
          artifacts: "build/app/outputs/flutter-apk/app-arm*.apk"
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          removeArtifacts: true
          body: |
            **Release Notes**
            ${{ needs.generate-notes.outputs.release_notes }}

            ---
            Instruções de instalação

            - Android habilite instalação de fontes desconhecidas e instale o arquivo .apk correspondente, 
              - **app-arm64-v8a-release.apk** para 64bits (mais que 4GB de RAM)
              - **app-armeabi-v7a-release.apk** 32 bits